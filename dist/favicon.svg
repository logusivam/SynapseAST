<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="lineGrad" x1="50%" y1="20%" x2="30%" y2="70%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="lineGradRight" x1="50%" y1="20%" x2="70%" y2="70%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#1C1C2E" stroke="#7C3AED" stroke-width="3" filter="url(#glow)" />
  
  <!-- Connection Lines -->
  <line x1="50" y1="30" x2="30" y2="70" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" />
  <line x1="50" y1="30" x2="70" y2="70" stroke="url(#lineGradRight)" stroke-width="4" stroke-linecap="round" />
  
  <!-- Nodes -->
  <circle cx="50" cy="30" r="8" fill="#7C3AED" />
  <circle cx="30" cy="70" r="8" fill="#06B6D4" />
  <circle cx="70" cy="70" r="8" fill="#06B6D4" />
</svg>
